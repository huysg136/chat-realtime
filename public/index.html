    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon/favicon.svg" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Quik" />
    <link rel="manifest" href="%PUBLIC_URL%/favicon/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#2d3748" />

    <meta name="description" content="Quik là mạng xã hội kết nối mọi người, mang đến trải nghiệm chia sẻ khoảnh khắc, nhắn tin và gọi thoại nhanh chóng, mượt mà và hoàn toàn bảo mật. Tham gia cộng đồng Quik để trò chuyện riêng tư, chia sẻ bài viết, tương tác với bạn bè và lan tỏa những giá trị tích cực mỗi ngày." />

    <meta name="keywords" content="Quik, mạng xã hội, social network, kết nối, chia sẻ khoảnh khắc, cộng đồng, bài viết, nhắn tin, chat realtime" />



    <!-- 🔹 Font & Icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 🔹 Title -->
    <title>Quik - Mạng xã hội kết nối và chia sẻ</title>

    <!-- 🔹 Structured Data (JSON-LD) cho Google gợi ý -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SocialNetworkingPlatform",
      "name": "Quik",
      "url": "https://quik.id.vn",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://quik.id.vn/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script src="https://cdn.stringee.com/sdk/web/latest/stringee-web-sdk.min.js"></script>
